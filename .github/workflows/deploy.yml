name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/configure-pages@v5
      - run: bun install --frozen-lockfile
      - run: bun run docs:build
      - name: Verify build output
        run: |
          for f in index.html verb-conjugation.html adjective-conjugation.html CNAME; do
            test -f ".vitepress/dist/$f" || { echo "::error::missing expected build output: dist/$f"; exit 1; }
          done
          echo "Build output verified — all expected pages and CNAME present."
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
